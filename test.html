<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Jimi Bank - 实时动账监控系统</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        #status { padding: 10px; margin-bottom: 20px; border-radius: 4px; font-weight: bold; }
        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
        #log { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; background: #2c3e50; color: #ecf0f1; border-radius: 8px; list-style: none; }
        .log-entry { margin-bottom: 10px; padding: 8px; border-left: 4px solid #3498db; background: rgba(255,255,255,0.1); }
        .type-TRANSFER { border-left-color: #f1c40f; }
        .type-DEPOSIT { border-left-color: #2ecc71; }
        .type-WITHDRAW { border-left-color: #e74c3c; }
        .timestamp { font-size: 0.8em; color: #95a5a6; margin-bottom: 5px; }
        .amount { font-weight: bold; color: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏦 Jimi Bank 实时动账流水</h2>
    <div id="status" class="disconnected">WebSocket 状态：未连接</div>

    <ul id="log">
        <li style="color: #95a5a6;">等待数据推送...</li>
    </ul>
</div>

<script>
    let stompClient = null;

    // 1. 连接 WebSocket
    function connect() {
        // 注意：根据你的 Spring Boot 配置决定是否需要带 Token
        // 如果后端拦截了 WebSocket 握手，请在下面添加 header
        const socket = new SockJS('http://localhost:8080/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            updateStatus(true);
            console.log('Connected: ' + frame);

            // 2. 订阅我们在 TransactionService 中定义的 topic
            stompClient.subscribe('/topic/transfer', function (response) {
                const data = JSON.parse(response.body);
                showNotification(data);
            });
        }, function (error) {
            updateStatus(false);
            console.log('Error: ' + error);
            // 5秒后尝试重连
            setTimeout(connect, 5000);
        });
    }

    function updateStatus(connected) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = connected ? "WebSocket 状态：已连接" : "WebSocket 状态：连接已断开 (尝试重连...)";
        statusDiv.className = connected ? "connected" : "disconnected";
    }

    function showNotification(tx) {
        const log = document.getElementById('log');
        if (log.children[0].style.color) log.innerHTML = ''; // 清除初始提示

        const entry = document.createElement('li');
        entry.className = `log-entry type-${tx.type}`;

        // 格式化逻辑
        let description = "";
        if(tx.type === 'TRANSFER') {
            description = `转账：从 [${tx.fromAccount}] 到 [${tx.toAccount}]`;
        } else if(tx.type === 'DEPOSIT') {
            description = `存款：账户 [${tx.toAccount}] 入账`;
        } else if(tx.type === 'WITHDRAW') {
            description = `取款：账户 [${tx.fromAccount}] 支出`;
        }

        entry.innerHTML = `
            <div class="timestamp">${new Date(tx.timestamp).toLocaleString()}</div>
            <div><strong>[${tx.type}]</strong> ${description}</div>
            <div class="amount">金额: ￥${tx.amount.toFixed(2)}</div>
            <div style="font-size: 0.85em; margin-top:5px;">状态: <span style="color:#3498db">${tx.status}</span></div>
        `;

        log.insertBefore(entry, log.firstChild);
    }

    // 页面加载完成后立即连接
    connect();
</script>

</body>
</html>
